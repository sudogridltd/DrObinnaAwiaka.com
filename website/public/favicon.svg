<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="badge" cx="38%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0c6860"/>
    </radialGradient>
  </defs>

  <!-- Subtle depth shadow -->
  <circle cx="32" cy="33.5" r="28.5" fill="#084e49" opacity="0.3"/>

  <!-- Main badge circle -->
  <circle cx="32" cy="32" r="29.5" fill="url(#badge)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Inner decorative ring -->
  <circle cx="32" cy="32" r="25.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Gold top arch accent -->
  <path d="M 20 17.5 Q 32 11.5 44 17.5" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- "DO" serif monogram -->
  <text
    x="32" y="40"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1.5"
  >DO</text>

  <!-- Gold bottom arch accent -->
  <path d="M 21 49.5 Q 32 55 43 49.5" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
