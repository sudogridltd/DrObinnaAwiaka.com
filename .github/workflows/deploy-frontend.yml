# ─────────────────────────────────────────────────────────────────────────────
# Deploy Frontend (Vike SSR) → cPanel shared hosting
#
# Required GitHub Secrets:
#   CPANEL_HOST             – server hostname or IP
#   CPANEL_PORT             – SSH port (usually 22)
#   CPANEL_USERNAME         – cPanel account username
#   CPANEL_SSH_KEY          – SSH private key (no passphrase)
#   FRONTEND_DEPLOY_PATH    – absolute path on server
#   VITE_STRAPI_URL         – Strapi API base URL (e.g. https://api.example.com)
#   VITE_STRAPI_API_TOKEN   – Strapi read-only API token
#
# Note: VITE_* vars are baked into the client bundle at build time by Vite.
# At runtime, server.ts also injects them via window.__ENV__ from process.env
# (set in cPanel Node.js Selector), so the runtime value always takes priority.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Frontend

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    name: Fetch env → Build → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # VITE_* vars are stored as GitHub Secrets and passed directly to the
      # build. At runtime, server.ts reads them from process.env (set in
      # cPanel Node.js Selector) and injects them into every HTML page via
      # window.__ENV__, so the live server value always takes priority.
      - name: Set build env vars
        run: |
          echo "VITE_STRAPI_URL=${{ secrets.VITE_STRAPI_URL }}" >> $GITHUB_ENV
          echo "VITE_STRAPI_API_TOKEN=${{ secrets.VITE_STRAPI_API_TOKEN }}" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ hashFiles('website/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        working-directory: website
        run: pnpm install --no-frozen-lockfile

      - name: Build Vike app + compile server
        working-directory: website
        run: pnpm build:all
        # VITE_* and NODE_ENV are already in the environment from the fetch step

      - name: Sync build to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CPANEL_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --filter='protect node_modules' \
            --exclude='.git' \
            --exclude='tmp' \
            --exclude='src' \
            --exclude='pages' \
            --exclude='*.ts' \
            --exclude='*.tsx' \
            --exclude='*.md' \
            --exclude='tsconfig*' \
            --exclude='eslint*' \
            --exclude='vite.config.ts' \
            --exclude='pnpm-lock.yaml' \
            website/ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.FRONTEND_DEPLOY_PATH }}/

      - name: Install production deps & restart
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} bash << 'EOF'
            set -e
            DEPLOY_ABS="${{ secrets.FRONTEND_DEPLOY_PATH }}"
            DEPLOY_REL=$(echo "$DEPLOY_ABS" | sed 's|^/home/[^/]*/||')
            # Remove real node_modules if present — CloudLinux requires it to be a symlink
            if [ -d "$DEPLOY_ABS/node_modules" ] && [ ! -L "$DEPLOY_ABS/node_modules" ]; then
              rm -rf "$DEPLOY_ABS/node_modules"
            fi
            # Source cPanel Node.js venv so npm is on PATH
            source "/home/${{ secrets.CPANEL_USERNAME }}/nodevenv/$DEPLOY_REL/22/bin/activate"
            cd "$DEPLOY_ABS"
            npm install --omit=dev --ignore-scripts
            # Use the minimal production vite config so Vike doesn't load the
            # full vite.config.ts (which imports devDeps not present in prod).
            # vite.config.js is resolved before vite.config.ts by Vite.
            cp vite.config.production.js vite.config.js
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Frontend deployed successfully"
          EOF
