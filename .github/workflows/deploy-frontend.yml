# ─────────────────────────────────────────────────────────────────────────────
# Deploy Frontend (Vike SSR) → cPanel shared hosting
#
# Required GitHub Secrets (SSH only — all app config lives in cPanel env vars):
#   CPANEL_HOST          – server hostname or IP
#   CPANEL_PORT          – SSH port (usually 22)
#   CPANEL_USERNAME      – cPanel account username
#   CPANEL_SSH_KEY       – SSH private key (no passphrase)
#   FRONTEND_DEPLOY_PATH – absolute path on server (/home/username/...)
#
# cPanel Node.js Selector → Environment Variables (set once on server):
#   NODE_ENV=production
#   VITE_STRAPI_URL=https://api.yourdomain.com
#   VITE_STRAPI_API_TOKEN=your-token
#   PORT=<assigned by cPanel automatically>
#
# cPanel Node.js Selector setup:
#   - Application startup file: server.js
#   - Node.js version:          22.x
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Frontend

on:
  push:
    branches: [production]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Sync & Build on cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CPANEL_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='tmp' \
            website/ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.FRONTEND_DEPLOY_PATH }}/

      - name: Install, build & restart on server
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} bash << 'EOF'
            set -e
            DEPLOY_ABS="${{ secrets.FRONTEND_DEPLOY_PATH }}"
            DEPLOY_REL=$(echo "$DEPLOY_ABS" | sed 's|^/home/[^/]*/||')
            # Source cPanel Node.js venv so node/npm/pnpm are on PATH
            source "/home/${{ secrets.CPANEL_USERNAME }}/nodevenv/$DEPLOY_REL/22/bin/activate"
            cd "$DEPLOY_ABS"
            # Install all deps (needed for build)
            npm install
            # Build — env vars come from cPanel Node.js Selector environment
            npm run build:all
            # Remove devDeps after build
            npm prune --omit=dev
            # Restart Passenger
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Frontend deployed successfully"
          EOF
