# ─────────────────────────────────────────────────────────────────────────────
# Deploy Backend (Strapi v5) → cPanel shared hosting
#
# Required GitHub Secrets (SSH only — all app config lives in cPanel env vars):
#   CPANEL_HOST          – server hostname or IP
#   CPANEL_PORT          – SSH port (usually 22)
#   CPANEL_USERNAME      – cPanel account username
#   CPANEL_SSH_KEY       – SSH private key (no passphrase)
#   BACKEND_DEPLOY_PATH  – absolute path on server (/home/username/...)
#
# cPanel Node.js Selector → Environment Variables (set once on server):
#   NODE_ENV=production
#   HOST=0.0.0.0
#   PORT=<assigned by cPanel automatically>
#   DATABASE_CLIENT=sqlite
#   DATABASE_FILENAME=.tmp/data.db
#   APP_KEYS=...
#   API_TOKEN_SALT=...
#   ADMIN_JWT_SECRET=...
#   TRANSFER_TOKEN_SALT=...
#   JWT_SECRET=...
#
# cPanel Node.js Selector setup:
#   - Application startup file: node_modules/.bin/strapi
#   - Node.js version:          22.x
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Backend

on:
  push:
    branches: [production]
    paths:
      - 'website-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Sync & Build on cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CPANEL_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='tmp' \
            --exclude='.tmp' \
            --exclude='database/*.db' \
            --exclude='database/*.db-journal' \
            --exclude='public/uploads' \
            website-backend/ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.BACKEND_DEPLOY_PATH }}/

      - name: Install, build & restart on server
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} bash << 'EOF'
            set -e
            DEPLOY_ABS="${{ secrets.BACKEND_DEPLOY_PATH }}"
            DEPLOY_REL=$(echo "$DEPLOY_ABS" | sed 's|^/home/[^/]*/||')
            # Remove stale node_modules if it's a real folder (CloudLinux needs it as symlink)
            if [ -d "$DEPLOY_ABS/node_modules" ] && [ ! -L "$DEPLOY_ABS/node_modules" ]; then
              rm -rf "$DEPLOY_ABS/node_modules"
            fi
            # Source cPanel Node.js venv so node/npm are on PATH
            source "/home/${{ secrets.CPANEL_USERNAME }}/nodevenv/$DEPLOY_REL/22/bin/activate"
            cd "$DEPLOY_ABS"
            # Install all deps (needed for Strapi admin build)
            npm install
            # Build Strapi admin panel — env vars come from cPanel Node.js Selector
            npm run build
            # Remove devDeps after build
            npm prune --omit=dev
            # Restart Passenger
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Backend deployed successfully"
          EOF
