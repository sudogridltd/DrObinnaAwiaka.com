# ─────────────────────────────────────────────────────────────────────────────
# Deploy Backend (Strapi v5) → cPanel shared hosting
#
# Required GitHub Secrets:
#   CPANEL_HOST                – server hostname or IP
#   CPANEL_PORT                – SSH port (usually 22)
#   CPANEL_USERNAME            – cPanel account username
#   CPANEL_SSH_KEY             – SSH private key (passphrase-protected is fine)
#   BACKEND_DEPLOY_PATH        – absolute path (/home/username/website-backend)
#   STRAPI_APP_KEYS            – APP_KEYS value (needed at admin build time)
#   STRAPI_API_TOKEN_SALT      – API_TOKEN_SALT value
#   STRAPI_ADMIN_JWT_SECRET    – ADMIN_JWT_SECRET value
#   STRAPI_TRANSFER_TOKEN_SALT – TRANSFER_TOKEN_SALT value
#   STRAPI_JWT_SECRET          – JWT_SECRET value
#
# NOTE: All runtime secrets (keys, DB config, URLs) should be set ONCE in
#       cPanel Node.js Selector → Environment Variables — NOT in a .env file.
#       The workflow only needs the secrets above for building the admin panel.
#
# cPanel Node.js Selector setup:
#   - Application root:         /home/username/website-backend
#   - Application URL:          api.your-domain.com
#   - Application startup file: node_modules/.bin/strapi
#   - Node.js version:          22.x
#   - Environment Variables (set in cPanel, not .env):
#       NODE_ENV=production
#       HOST=0.0.0.0
#       PORT=<assigned by cPanel>
#       DATABASE_CLIENT=sqlite
#       DATABASE_FILENAME=.tmp/data.db
#       APP_KEYS, API_TOKEN_SALT, ADMIN_JWT_SECRET,
#       TRANSFER_TOKEN_SALT, JWT_SECRET
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Backend

on:
  push:
    branches: [production]
    paths:
      - 'website-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Strapi to cPanel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website-backend/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Build Strapi admin panel
        run: npm run build
        env:
          NODE_ENV: production
          APP_KEYS: ${{ secrets.STRAPI_APP_KEYS }}
          API_TOKEN_SALT: ${{ secrets.STRAPI_API_TOKEN_SALT }}
          ADMIN_JWT_SECRET: ${{ secrets.STRAPI_ADMIN_JWT_SECRET }}
          TRANSFER_TOKEN_SALT: ${{ secrets.STRAPI_TRANSFER_TOKEN_SALT }}
          JWT_SECRET: ${{ secrets.STRAPI_JWT_SECRET }}

      # ssh-agent loads the key once (handles passphrase-protected keys).
      # All subsequent ssh/rsync steps use the agent automatically.
      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}
          ssh-passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Syncs source + built admin. Excludes uploads, database, and node_modules.
      # Database and uploads persist on the server across deploys (not overwritten).
      - name: Sync build to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CPANEL_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='tmp' \
            --exclude='.tmp' \
            --exclude='database' \
            --exclude='public/uploads' \
            ./ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.BACKEND_DEPLOY_PATH }}/

      # npm install on server installs only runtime deps.
      # cPanel can also trigger this via "Run NPM Install" button — both work.
      - name: Install production dependencies & restart app
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            npm install --omit=dev
            # Passenger restarts on next request after seeing restart.txt is touched
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Backend deployed successfully"
          EOF
